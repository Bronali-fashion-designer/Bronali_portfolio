<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bronali Couture</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
}

/* VIDEO BG */
.video-bg {
  position: fixed;
  width:100%;
  height:100%;
  z-index:-1;
}
.video-bg video {
  width:100%;
  height:100%;
  object-fit:cover;
  filter: brightness(35%);
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.hero h1 {
  font-size:90px;
  font-family:'Playfair Display';
}

/* SECTION */
.section {
  padding:80px 10%;
}
.section-title {
  font-size:38px;
  margin-bottom:30px;
  font-family:'Playfair Display';
}

/* 🔥 MASONRY LAYOUT */
.masonry {
  column-count: 3;
  column-gap: 15px;
}

.masonry img {
  width:100%;
  margin-bottom:15px;
  break-inside: avoid;
  cursor:pointer;
  transition:0.4s;
}

.masonry img:hover {
  transform:scale(1.03);
  opacity:0.9;
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:black;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}

/* MOBILE */
@media(max-width:900px){
  .masonry { column-count:2; }
}
@media(max-width:500px){
  .masonry { column-count:1; }
}

</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<!-- HERO -->
<section class="hero">
  <h1>BRONALI</h1>
</section>

<!-- GALLERY CONTAINER -->
<div id="gallery"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img">
</div>

<script>

/* 🔥 YOUR SECTIONS */
const sections = [
  { title: "Capsule Collection", folder: "bunny_fd/capsule_collections/", count: 6 },
  { title: "Design Process", folder: "bunny_fd/Design Process/", count: 3 },
  { title: "Digital Illustrations", folder: "bunny_fd/Digital illustrations/", count: 3 },
  { title: "Fabric Paintings", folder: "bunny_fd/fabric paintings/", count: 2 },
  { title: "Fashion Illustrations", folder: "bunny_fd/fashion illustrations/", count: 3 },
  { title: "Illustrations", folder: "bunny_fd/illustrations/", count: 2 },
  { title: "Textile Designs", folder: "bunny_fd/Textile Designs/", count: 3 }
];

const container = document.getElementById("gallery");

/* CREATE LUXURY MASONRY */
sections.forEach(sec => {

  const section = document.createElement("section");
  section.className = "section";

  const title = document.createElement("h2");
  title.className = "section-title";
  title.innerText = sec.title;

  const masonry = document.createElement("div");
  masonry.className = "masonry";

  for(let i=1;i<=sec.count;i++){
    const img = document.createElement("img");
    img.src = sec.folder + i + ".JPG";

    img.onclick = () => {
      document.getElementById("lightbox").style.display="flex";
      document.getElementById("lightbox-img").src = img.src;
    };

    masonry.appendChild(img);
  }

  section.appendChild(title);
  section.appendChild(masonry);
  container.appendChild(section);

});

</script>

</body>
</html>
