<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bronali Couture</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  background: black;
  overflow-x: hidden;
}

/* VIDEO BACKGROUND */
.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}
.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(35%) contrast(110%);
}

/* HERO */
.hero {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 90px;
  letter-spacing: 8px;
}

.hero p {
  width: 55%;
  opacity: 0.85;
  line-height: 1.8;
}

/* SECTION */
.section {
  padding: 100px 12%;
  backdrop-filter: blur(8px);
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  margin-bottom: 30px;
}

/* EDITORIAL LAYOUT */
.editorial {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 15px;
  margin-bottom: 20px;
}

.editorial img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
  transition: 0.5s;
}

.editorial .big {
  grid-row: span 2;
}

.editorial img:hover {
  transform: scale(1.04);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 15px;
}

.grid img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  cursor: pointer;
  transition: 0.5s;
}

.grid img:hover {
  transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background: rgba(0,0,0,0.95);
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<!-- HERO -->
<section class="hero fade">
  <h1>BRONALI</h1>
  <p>
    I am Bronali Manthena, a fashion design student drawn to elegance, femininity, and refined silhouettes.
    My work explores timeless aesthetics with a modern sensibility inspired by luxury fashion.
  </p>
</section>

<!-- GALLERY -->
<div id="gallery"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>

/* LIGHTBOX */
function openLightbox(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}
function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}

/* SCROLL ANIMATION */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

/* YOUR DATA */
const sections = [
  { title: "Capsule Collection", folder: "bunny_fd/capsule_collections/", count: 6 },
  { title: "Design Process", folder: "bunny_fd/Design Process/", count: 3 },
  { title: "Digital Illustrations", folder: "bunny_fd/Digital illustrations/", count: 3 },
  { title: "Fabric Paintings", folder: "bunny_fd/fabric paintings/", count: 2 },
  { title: "Fashion Illustrations", folder: "bunny_fd/fashion illustrations/", count: 3 },
  { title: "Illustrations", folder: "bunny_fd/illustrations/", count: 2 },
  { title: "Textile Designs", folder: "bunny_fd/Textile Designs/", count: 3 }
];

const container = document.getElementById("gallery");

/* BUILD UI */
sections.forEach(sec => {

  const section = document.createElement("section");
  section.className = "section fade";

  const title = document.createElement("h2");
  title.className = "section-title";
  title.innerText = sec.title;

  /* EDITORIAL BLOCK */
  const editorial = document.createElement("div");
  editorial.className = "editorial";

  // BIG IMAGE
  if(sec.count >= 1){
    const big = document.createElement("img");
    big.src = sec.folder + "1.JPG";
    big.className = "big";
    big.onclick = () => openLightbox(big.src);
    editorial.appendChild(big);
  }

  // SIDE IMAGES
  for(let i=2;i<=3 && i<=sec.count;i++){
    const img = document.createElement("img");
    img.src = sec.folder + i + ".JPG";
    img.onclick = () => openLightbox(img.src);
    editorial.appendChild(img);
  }

  section.appendChild(title);
  section.appendChild(editorial);

  /* REMAINING GRID */
  if(sec.count > 3){
    const grid = document.createElement("div");
    grid.className = "grid";

    for(let i=4;i<=sec.count;i++){
      const img = document.createElement("img");
      img.src = sec.folder + i + ".JPG";
      img.onclick = () => openLightbox(img.src);
      grid.appendChild(img);
    }

    section.appendChild(grid);
  }

  container.appendChild(section);
  observer.observe(section);

});

</script>

</body>
</html>
