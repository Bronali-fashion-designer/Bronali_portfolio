<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bronali Couture</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  background: black;
  overflow-x: hidden;
}

/* VIDEO */
.video-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}
.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(35%);
}

/* HERO */
.hero {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 90px;
}
.hero p {
  width:55%;
  opacity:0.8;
}

/* SECTION */
.section {
  padding: 100px 12%;
  backdrop-filter: blur(10px);
}
.section-title {
  font-size:40px;
  font-family:'Playfair Display';
  margin-bottom:30px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}
.grid img {
  width:100%;
  height:320px;
  object-fit:cover;
  cursor:pointer;
  transition:0.5s;
}
.grid img:hover {
  transform:scale(1.08);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:black;
}
.lightbox img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<!-- HERO -->
<section class="hero">
  <h1>BRONALI</h1>
  <p>Luxury fashion portfolio exploring elegance and modern femininity.</p>
</section>

<!-- CONTAINER -->
<div id="gallery-container"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img">
</div>

<script>

/* 🔥 DEFINE YOUR FOLDERS + IMAGE COUNTS HERE */
const sections = [
  { title: "Capsule Collection", folder: "bunny_fd/capsule_collections/", count: 6 },
  { title: "Design Process", folder: "bunny_fd/Design Process/", count: 3 },
  { title: "Digital Illustrations", folder: "bunny_fd/Digital illustrations/", count: 3 },
  { title: "Fabric Paintings", folder: "bunny_fd/fabric paintings/", count: 2 },
  { title: "Fashion Illustrations", folder: "bunny_fd/fashion illustrations/", count: 3 },
  { title: "Illustrations", folder: "bunny_fd/illustrations/", count: 2 },
  { title: "Textile Designs", folder: "bunny_fd/Textile Designs/", count: 3 }
];

/* AUTO GENERATE UI */
const container = document.getElementById("gallery-container");

sections.forEach(sec => {
  const section = document.createElement("section");
  section.className = "section";

  const title = document.createElement("h2");
  title.className = "section-title";
  title.innerText = sec.title;

  const grid = document.createElement("div");
  grid.className = "grid";

  for (let i = 1; i <= sec.count; i++) {
    const img = document.createElement("img");
    img.src = sec.folder + i + ".JPG";

    img.onclick = () => {
      document.getElementById("lightbox").style.display = "flex";
      document.getElementById("lightbox-img").src = img.src;
    };

    grid.appendChild(img);
  }

  section.appendChild(title);
  section.appendChild(grid);
  container.appendChild(section);
});

</script>

</body>
</html>
